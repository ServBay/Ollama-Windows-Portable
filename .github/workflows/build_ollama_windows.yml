name: Build Ollama for Windows

on:
  workflow_dispatch:
    inputs:
      ollama_version:
        description: 'The Ollama version to build (e.g., 0.1.43). The workflow will checkout tag v<version>.'
        required: true
        type: string

# Elevate GITHUB_TOKEN so Create GitHub Release works; the org joined an
# enterprise that reset the repo default workflow permission to read-only.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Ollama source code
        uses: actions/checkout@v4
        with:
          repository: ollama/ollama
          ref: v${{ inputs.ollama_version }}

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build and stage Ollama payload
        id: build
        shell: pwsh
        env:
          # Keep VERSION free of spaces: upstream passes it through Go ldflags.
          VERSION: ${{ inputs.ollama_version }}
          ARCH: amd64
          GOOS: windows
          GOARCH: amd64
        run: |
          $ErrorActionPreference = "Stop"
          $payloadDir = Join-Path $env:GITHUB_WORKSPACE "staging\payload"
          New-Item -ItemType Directory -Force -Path $payloadDir | Out-Null

          Write-Host "Starting build for Ollama version: ${{ inputs.ollama_version }}"
          $hasNativePayloadBuild =
            (Test-Path ".\scripts\build_windows.ps1") -and
            (Test-Path ".\llama\server\CMakeLists.txt")

          if ($hasNativePayloadBuild) {
            Write-Host "Detected the native llama-server source layout."
            & .\scripts\build_windows.ps1 cpu ollama
            if ($LASTEXITCODE -ne 0) {
              throw "Upstream Windows build failed with exit code $LASTEXITCODE."
            }

            $distDir = Join-Path $env:GITHUB_WORKSPACE "dist\windows-amd64"
            if (-not (Test-Path $distDir -PathType Container)) {
              throw "Upstream build did not create the expected payload: $distDir"
            }

            Copy-Item -Path (Join-Path $distDir "*") -Destination $payloadDir -Recurse -Force
            $buildLayout = "native"
          }
          else {
            Write-Host "Legacy source layout detected; using the Go-only fallback."
            $outputFile = Join-Path $payloadDir "ollama.exe"
            $ldflags = "-s -w -X=github.com/ollama/ollama/version.Version=$env:VERSION -X=github.com/ollama/ollama/server.mode=release"

            & go build -trimpath -ldflags $ldflags -o $outputFile .
            if ($LASTEXITCODE -ne 0) {
              throw "Legacy Go build failed with exit code $LASTEXITCODE."
            }
            $buildLayout = "legacy"
          }

          # Upstream builds ollama.exe with CGO_ENABLED=1, which links it against
          # the MinGW runtime (libwinpthread-1.dll, ...). Those DLLs sit on the
          # CI runner's PATH but not on end-user machines, so ollama.exe dies
          # with STATUS_DLL_NOT_FOUND (0xC0000135) at launch. Locate the Go cgo
          # compiler and stage its MinGW runtime DLLs next to ollama.exe.
          $gcc = Get-Command gcc.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $gcc) {
            throw "gcc.exe not found on PATH; cannot stage MinGW runtime for ollama.exe."
          }
          $gccDir = Split-Path -Parent $gcc.Path
          Write-Host "Staging MinGW runtime DLLs from: $gccDir"
          $mingwRuntimeDlls = @(
            "libwinpthread-1.dll",
            "libgcc_s_seh-1.dll",
            "libgcc_s_dw2-1.dll",
            "libstdc++-6.dll"
          )
          $stagedRuntimeDlls = @()
          foreach ($dll in $mingwRuntimeDlls) {
            $src = Join-Path $gccDir $dll
            if (Test-Path $src -PathType Leaf) {
              Copy-Item -Path $src -Destination (Join-Path $payloadDir $dll) -Force
              $stagedRuntimeDlls += $dll
              Write-Host "  staged $dll"
            }
          }
          if ($stagedRuntimeDlls.Count -eq 0) {
            throw "No MinGW runtime DLLs found next to gcc.exe; ollama.exe would fail to launch on end-user machines."
          }
          "STAGED_MINGW_DLLS=$($stagedRuntimeDlls -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          "BUILD_LAYOUT=$buildLayout" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Build completed using the $buildLayout layout."

      - name: Verify build output
        shell: pwsh
        env:
          BUILD_LAYOUT: ${{ steps.build.outputs.BUILD_LAYOUT }}
          STAGED_MINGW_DLLS: ${{ steps.build.outputs.STAGED_MINGW_DLLS }}
        run: |
          $ErrorActionPreference = "Stop"
          $payloadDir = Join-Path $env:GITHUB_WORKSPACE "staging\payload"
          $requiredFiles = @("ollama.exe")

          if ($env:BUILD_LAYOUT -eq "native") {
            $requiredFiles += @(
              "lib\ollama\llama-server.exe",
              "lib\ollama\llama-quantize.exe"
            )
          }

          # libwinpthread-1.dll is required by CGO-linked ollama.exe on every
          # end-user machine; make it a hard requirement so we never ship a ZIP
          # that dies with STATUS_DLL_NOT_FOUND on launch.
          $requiredFiles += "libwinpthread-1.dll"

          foreach ($relativePath in $requiredFiles) {
            $file = Join-Path $payloadDir $relativePath
            if (-not (Test-Path $file -PathType Leaf)) {
              throw "Build failed: required payload file not found: $relativePath"
            }
            if ((Get-Item $file).Length -eq 0) {
              throw "Build failed: required payload file is empty: $relativePath"
            }
            Write-Host "Verified $relativePath"
          }

          # Reproduce an end-user machine by scrubbing PATH down to the two
          # Windows system dirs. The CI runner ships with MinGW on PATH, which
          # would otherwise hide missing MinGW runtime DLLs inside the payload.
          $originalPath = $env:PATH
          try {
            $env:PATH = "$env:SystemRoot\System32;$env:SystemRoot"
            Write-Host "Verifying with isolated PATH: $env:PATH"

            Write-Host "Checking ollama.exe version..."
            & (Join-Path $payloadDir "ollama.exe") --version
            if ($LASTEXITCODE -ne 0) {
              throw "ollama.exe --version failed with exit code $LASTEXITCODE under an isolated PATH; the payload is missing a runtime DLL."
            }

            if ($env:BUILD_LAYOUT -eq "native") {
              Write-Host "Checking llama-server.exe and its bundled DLL dependencies..."
              & (Join-Path $payloadDir "lib\ollama\llama-server.exe") --version
              if ($LASTEXITCODE -ne 0) {
                throw "llama-server.exe --version failed with exit code $LASTEXITCODE under an isolated PATH; the payload is missing a runtime DLL."
              }
            }
          } finally {
            $env:PATH = $originalPath
          }

          Write-Host "Payload contents:"
          Get-ChildItem -Path $payloadDir -Recurse -File |
            ForEach-Object { $_.FullName.Substring($payloadDir.Length + 1) }

      - name: Package the payload into a ZIP file
        id: package
        shell: pwsh
        env:
          BUILD_LAYOUT: ${{ steps.build.outputs.BUILD_LAYOUT }}
          OLLAMA_VERSION: ${{ inputs.ollama_version }}
        run: |
          $ErrorActionPreference = "Stop"
          $zipFileName = "ollama-$env:OLLAMA_VERSION-win-x64.zip"
          $zipFilePath = Join-Path $env:GITHUB_WORKSPACE $zipFileName
          $payloadDir = Join-Path $env:GITHUB_WORKSPACE "staging\payload"

          Compress-Archive -Path (Join-Path $payloadDir "*") -DestinationPath $zipFilePath

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zipFilePath)
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName.Replace("\", "/") })
            $requiredEntries = @("ollama.exe", "libwinpthread-1.dll")
            if ($env:BUILD_LAYOUT -eq "native") {
              $requiredEntries += @(
                "lib/ollama/llama-server.exe",
                "lib/ollama/llama-quantize.exe"
              )
            }
            foreach ($entry in $requiredEntries) {
              if ($entries -notcontains $entry) {
                throw "ZIP verification failed: required entry not found: $entry"
              }
            }
          }
          finally {
            $archive.Dispose()
          }

          Write-Host "Created ZIP package: $zipFileName"
          
          echo "ZIP_FILE_NAME=$zipFileName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "ZIP_FILE_PATH=$zipFilePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v${{ inputs.ollama_version }}
          name: Ollama ${{ inputs.ollama_version }} for Windows x64 (ServBay Build)
          body: |
            This is a custom build of Ollama **v${{ inputs.ollama_version }}** for Windows x64.

          draft: false
          prerelease: false
          files: ${{ steps.package.outputs.ZIP_FILE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
